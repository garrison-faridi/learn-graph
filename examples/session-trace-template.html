  { t: 10, phase: "PHASE 5 · EVAL: MISCONCEPTIONS", text: "🚨 'DNA polymerase' → should be RNA polymerase — CRITICAL · penalty = 0.30",
    light: [], edges: [], glow: ["Ch15-Genes-and-Proteins"], color: "#ef4444" },
  { t: 11, phase: "PHASE 6 · SYNTHESIS", text: "0.45(0.67) + 0.40(0.12) + 0.15(0.70) = 0.37 → 🔴 Needs Work",
    light: [], edges: [], glow: ["Ch15-Genes-and-Proteins"], color: "#ef4444" },
  { t: 12, phase: "PHASE 7 · UPDATE WEIGHTS", text: "Ch15 mastery drops: M = 0.50 → 0.22 · W = 0.325 → 0.422 ↑ priority",
    light: [], edges: [], glow: ["Ch15-Genes-and-Proteins"], color: "#ef4444", weight: { id: "Ch15-Genes-and-Proteins", val: "W 0.422 ↑" } },
  { t: 13, phase: "PHASE 7 · RIPPLE", text: "Neighbor prerequisite gaps shift — weakness propagates through genetics cluster",
    light: ["Ch11-Meiosis-and-Sexual-Reproduction","Ch12-Mendel-s-Experiments-and-Heredity","Ch13-Modern-Understandings-of-Inheritance","Ch17-Biotechnology-and-Genomics"],
    edges: [["Ch15-Genes-and-Proteins","Ch11-Meiosis-and-Sexual-Reproduction"],["Ch15-Genes-and-Proteins","Ch12-Mendel-s-Experiments-and-Heredity"],["Ch15-Genes-and-Proteins","Ch13-Modern-Understandings-of-Inheritance"],["Ch15-Genes-and-Proteins","Ch14-DNA-Structure-and-Function"],["Ch15-Genes-and-Proteins","Ch16-Gene-Expression"],["Ch15-Genes-and-Proteins","Ch17-Biotechnology-and-Genomics"]],
    glow: ["Ch15-Genes-and-Proteins"], color: "#a78bfa" },
  { t: 14, phase: "PHASE 7 · SAVE GAPS", text: "8 vault gaps persisted for Ch15 — untested depth queued for future sessions",
    light: [], edges: [], glow: ["Ch15-Genes-and-Proteins"], color: "#63b8ff" },
  { t: 15, phase: "SESSION COMPLETE", text: "Ch15 → 🔴 0.37 · Weight ↑ 0.422 · 8 gaps queued · Neighbors shifted",
    light: [], edges: [], glow: ["Ch15-Genes-and-Proteins","Ch14-DNA-Structure-and-Function","Ch16-Gene-Expression"], color: "#22c55e" },
];

// ============================================================
// COLORS
// ============================================================

const unitColors = {
  "01-Chemistry-of-Life":     "#3b82f6",
  "02-The-Cell":              "#22c55e",
  "03-Genetics":              "#a78bfa",
  "04-Evolution":             "#f59e0b",
  "05-Biological-Diversity":  "#ec4899",
  "06-Plant-Biology":         "#14b8a6",
  "07-Animal-Systems":        "#ef4444",
  "08-Ecology":               "#06b6d4",
};

// ============================================================
// CANVAS
// ============================================================

const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H;
const dpr = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// LAYOUT
// ============================================================

const nodeMap = {};
graphData.nodes.forEach(n => {
  n.x = W/2 + (Math.random() - 0.5) * W * 0.5;
  n.y = H/2 + (Math.random() - 0.5) * H * 0.4;
  n.vx = 0; n.vy = 0;
  n.lit = 0;        // 0 = dark, 1 = fully lit — accumulates
  n.glowPulse = 0;  // active glow pulse (current step)
  n.activeColor = null;
  n.weightText = '';
  nodeMap[n.id] = n;
});

const edgeObjs = graphData.edges.map(e => ({
  source: nodeMap[e.source], target: nodeMap[e.target],
  lit: 0, pulse: 0
}));

// Unit cluster targets
const unitList = [...new Set(graphData.nodes.map(n => n.unit))].sort();
const uc = {};
const aStep = (Math.PI * 2) / unitList.length;
unitList.forEach((u, i) => {
  const a = i * aStep - Math.PI/2;
  uc[u] = { x: W/2 + Math.cos(a) * Math.min(W,H) * 0.22, y: H/2 + Math.sin(a) * Math.min(W,H) * 0.2 };
});

function simulate() {
  const nodes = graphData.nodes;
  const pad = 120; // soft padding from edges — no hard clamp

  nodes.forEach(n => {
    // Gentle center pull
    n.vx += (W/2 - n.x) * 0.001;
    n.vy += (H/2 - n.y) * 0.001;

    // Unit clustering — pull toward cluster center
    const c = uc[n.unit];
    if (c) { n.vx += (c.x - n.x) * 0.008; n.vy += (c.y - n.y) * 0.008; }

    // Soft boundary repulsion instead of hard clamp
    if (n.x < pad) n.vx += (pad - n.x) * 0.05;
    if (n.x > W - pad) n.vx -= (n.x - (W - pad)) * 0.05;
    if (n.y < pad) n.vy += (pad - n.y) * 0.05;
    if (n.y > H - pad) n.vy -= (n.y - (H - pad)) * 0.05;
  });

  // Node-node repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
      let d2 = dx*dx + dy*dy || 1;
      const f = 500 / d2;
      nodes[i].vx -= dx*f; nodes[i].vy -= dy*f;
      nodes[j].vx += dx*f; nodes[j].vy += dy*f;
    }
  }

  // Edge spring attraction
  edgeObjs.forEach(e => {
    const dx = e.target.x - e.source.x, dy = e.target.y - e.source.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    const f = (d - 65) * 0.002;
    e.source.vx += dx/d*f; e.source.vy += dy/d*f;
    e.target.vx -= dx/d*f; e.target.vy -= dy/d*f;
  });

  // Apply with damping — no hard clamp
  nodes.forEach(n => {
    n.vx *= 0.8; n.vy *= 0.8;
    n.x += n.vx * 0.12;
    n.y += n.vy * 0.12;
  });
}

for (let i = 0; i < 350; i++) simulate();

// ============================================================
// STEP DOTS
// ============================================================

const dotsEl = document.getElementById('step-dots');
events.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'step-dot';
  d.addEventListener('click', () => goToStep(i));
  dotsEl.appendChild(d);
});
const dots = dotsEl.querySelectorAll('.step-dot');

// ============================================================
// STATE
// ============================================================

let currentStep = -1;
let playing = false;
let timer = null;
let speed = 1;
let t = 0;

function resetAll() {
  graphData.nodes.forEach(n => { n.lit = 0; n.glowPulse = 0; n.activeColor = null; n.weightText = ''; });
  edgeObjs.forEach(e => { e.lit = 0; e.pulse = 0; });
  dots.forEach(d => { d.className = 'step-dot'; });
}

function applyEvent(idx) {
  const ev = events[idx];
  // Clear active glow (but keep lit state)
  graphData.nodes.forEach(n => { n.glowPulse = 0; n.activeColor = null; });
  edgeObjs.forEach(e => { e.pulse = 0; });

  // Light up new nodes (cumulative)
  ev.light.forEach(id => {
    const n = nodeMap[id];
    if (n) { n.lit = Math.min(1, n.lit + 0.6); n.activeColor = ev.color; }
  });

  // Active glow
  ev.glow.forEach(id => {
    const n = nodeMap[id];
    if (n) { n.glowPulse = 1; n.activeColor = ev.color; n.lit = 1; }
  });

  // Edges
  ev.edges.forEach(([s,t]) => {
    const e = edgeObjs.find(e =>
      (e.source.id===s && e.target.id===t) || (e.source.id===t && e.target.id===s));
    if (e) { e.lit = 1; e.pulse = 1; }
  });

  // Weight text
  if (ev.weight) {
    const n = nodeMap[ev.weight.id];
    if (n) n.weightText = ev.weight.val;
  }

  // UI
  document.querySelector('#status-pill .phase').textContent = ev.phase;
  document.querySelector('#status-pill .action').textContent = ev.text;
  const pillColor = ev.color || '#63b8ff';
  document.getElementById('status-pill').style.borderColor = pillColor + '40';

  dots.forEach((d,i) => {
    d.className = 'step-dot' + (i < idx ? ' visited' : '') + (i === idx ? ' current' : '');
  });
}

function goToStep(idx) {
  if (idx < 0 || idx >= events.length) return;
  resetAll();
  currentStep = idx;
  for (let i = 0; i <= idx; i++) {
    // Apply cumulative lit state from all previous steps
    const ev = events[i];
    ev.light.forEach(id => { const n = nodeMap[id]; if(n) n.lit = Math.min(1, n.lit + 0.6); });
    ev.glow.forEach(id => { const n = nodeMap[id]; if(n) n.lit = 1; });
    ev.edges.forEach(([s,t]) => {
      const e = edgeObjs.find(e =>
        (e.source.id===s && e.target.id===t) || (e.source.id===t && e.target.id===s));
      if (e) e.lit = 1;
    });
    if (ev.weight) { const n = nodeMap[ev.weight.id]; if(n) n.weightText = ev.weight.val; }
  }
  applyEvent(idx);
}

function playNext() {
  if (!playing) return;
  currentStep++;
  if (currentStep >= events.length) { stopPlay(); return; }
  goToStep(currentStep);
  const dur = currentStep === 0 ? 1800 : (currentStep >= events.length-1 ? 3500 : 2200);
  timer = setTimeout(playNext, dur / speed);
}

function startPlay() {
  if (currentStep >= events.length - 1) { currentStep = -1; resetAll(); }
  playing = true;
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('btn-play').classList.add('active');
  playNext();
}

function stopPlay() {
  playing = false;
  clearTimeout(timer);
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('btn-play').classList.remove('active');
}

document.getElementById('btn-play').onclick = () => playing ? stopPlay() : startPlay();
document.getElementById('btn-reset').onclick = () => { stopPlay(); currentStep = -1; resetAll();
  document.querySelector('#status-pill .phase').textContent = 'READY';
  document.querySelector('#status-pill .action').textContent = 'Press play to watch the session unfold across the graph';
  document.getElementById('status-pill').style.borderColor = 'rgba(255,255,255,0.08)';
};
document.getElementById('btn-prev').onclick = () => { stopPlay(); goToStep(Math.max(0, currentStep - 1)); };
document.getElementById('btn-next').onclick = () => { stopPlay(); goToStep(Math.min(events.length-1, currentStep + 1)); };

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'k') { e.preventDefault(); playing ? stopPlay() : startPlay(); }
  if (e.key === 'ArrowRight') { stopPlay(); goToStep(Math.min(events.length-1, currentStep+1)); }
  if (e.key === 'ArrowLeft') { stopPlay(); goToStep(Math.max(0, currentStep-1)); }
  if (e.key === 'r') document.getElementById('btn-reset').click();
  if (e.key === '1') speed = 0.5;
  if (e.key === '2') speed = 1;
  if (e.key === '3') speed = 2;
  if (e.key === '4') speed = 4;
  document.getElementById('speed-indicator').textContent = speed + '×';
});

// Tooltip
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX - camX, my = e.clientY - camY;
  const tt = document.getElementById('node-tooltip');
  let hit = null;
  graphData.nodes.forEach(n => {
    if ((n.x-mx)**2 + (n.y-my)**2 < 300) hit = n;
  });
  if (hit) {
    tt.style.display = 'block';
    tt.style.left = (mx+14) + 'px';
    tt.style.top = (my-8) + 'px';
    tt.querySelector('.tt-name').textContent = `Ch ${hit.ch}: ${hit.label}`;
    tt.querySelector('.tt-unit').textContent = hit.unit.replace(/^\d+-/,'').replace(/-/g,' ');
    tt.querySelector('.tt-state').textContent = hit.lit > 0 ? (hit.weightText || '● touched') : '○ untouched';
    tt.querySelector('.tt-state').style.color = hit.activeColor || '#888';
  } else { tt.style.display = 'none'; }
});

// ============================================================
// RENDER
// ============================================================

// Camera — smoothly tracks the active cluster center
let camX = 0, camY = 0;
let targetCamX = 0, targetCamY = 0;

function updateCamera() {
  // Find centroid of all glowing + lit nodes (the active trace)
  const active = graphData.nodes.filter(n => n.glowPulse > 0 || n.lit > 0.3);
  if (active.length > 0) {
    let cx = 0, cy = 0;
    active.forEach(n => { cx += n.x; cy += n.y; });
    cx /= active.length;
    cy /= active.length;
    // Offset needed to center that centroid on screen
    targetCamX = W/2 - cx;
    targetCamY = H/2 - cy;
  } else {
    targetCamX = 0;
    targetCamY = 0;
  }
  // Smooth lerp
  camX += (targetCamX - camX) * 0.04;
  camY += (targetCamY - camY) * 0.04;
}

function draw() {
  t += 0.015;
  ctx.clearRect(0, 0, W, H);

  updateCamera();
  ctx.save();
  ctx.translate(camX, camY);

  // Edges — dim constellation lines at rest
  edgeObjs.forEach(e => {
    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);

    if (e.pulse > 0) {
      const a = 0.3 + 0.3 * Math.sin(t * 4);
      ctx.strokeStyle = `rgba(167, 139, 250, ${a})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Particle
      const pt = (t * 0.6) % 1;
      const px = e.source.x + (e.target.x - e.source.x) * pt;
      const py = e.source.y + (e.target.y - e.source.y) * pt;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI*2);
      ctx.fillStyle = '#a78bfa';
      ctx.fill();
    } else if (e.lit > 0) {
      ctx.strokeStyle = `rgba(167, 139, 250, ${0.15 + 0.15 * e.lit})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    } else {
      // Constellation lines — visible but subtle
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  });

  // Nodes — dim constellation dots at rest, bright when active
  graphData.nodes.forEach(n => {
    const baseColor = unitColors[n.unit] || '#666';

    // Active glow ring
    if (n.glowPulse > 0) {
      const pulseR = 24 + 7 * Math.sin(t * 3);
      const grad = ctx.createRadialGradient(n.x, n.y, 4, n.x, n.y, pulseR);
      const ac = n.activeColor || baseColor;
      grad.addColorStop(0, ac + '55');
      grad.addColorStop(0.5, ac + '18');
      grad.addColorStop(1, ac + '00');
      ctx.beginPath();
      ctx.arc(n.x, n.y, pulseR, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Node circle
    const r = n.glowPulse > 0 ? 8 : (n.lit > 0 ? 6 : 4);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);

    if (n.glowPulse > 0) {
      ctx.fillStyle = n.activeColor || baseColor;
    } else if (n.lit > 0) {
      ctx.fillStyle = baseColor;
      ctx.globalAlpha = 0.4 + 0.5 * n.lit;
    } else {
      // Dim constellation dot — tinted by unit color
      ctx.fillStyle = baseColor;
      ctx.globalAlpha = 0.15;
    }
    ctx.fill();
    ctx.globalAlpha = 1;

    // Subtle unit-colored border on dormant nodes for constellation effect
    if (n.lit <= 0 && n.glowPulse <= 0) {
      ctx.strokeStyle = baseColor + '20';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    } else if (n.lit > 0) {
      ctx.strokeStyle = baseColor + '50';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Labels
    if (n.glowPulse > 0) {
      ctx.font = 'bold 11px "SF Mono", "Fira Code", monospace';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y - r - 10);
      if (n.weightText) {
        ctx.font = '10px "SF Mono", monospace';
        ctx.fillStyle = n.activeColor || '#ef4444';
        ctx.fillText(n.weightText, n.x, n.y + r + 16);
      }
    } else if (n.lit > 0.4) {
      ctx.font = '9px "SF Mono", "Fira Code", monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y - r - 6);
    }
  });

  ctx.restore(); // end camera transform
}

function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
